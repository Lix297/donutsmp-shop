<!DOCTYPE html>
<html>
<head>
<title>DonutSMP Shop</title>
<style>
body{
background:#111;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
padding:40px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
max-width:1000px;
width:100%;
}

.card{
background:#1f1f1f;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px rgba(255,0,255,0.3);
}

.price{
color:#bb86fc;
font-size:24px;
font-weight:bold;
}

button{
background:#bb00ff;
color:white;
border:none;
padding:12px 25px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#d14cff;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>💀 Skeleton Spawner</h2>
<p class="price">€0.25</p>
<button>Pirkti</button>
</div>

<div class="card">
<h2>💰 1M Money</h2>
<p class="price">€0.08</p>
<button>Pirkti</button>
</div>

<div class="card">
<h2>💸 10M Money</h2>
<p class="price">€0.70</p>
<button>Pirkti</button>
</div>

<div class="card">
<h2>🏦 100M Money</h2>
<p class="price">€7.00</p>
<button>Pirkti</button>
</div>

</div>

</body>
</html>
