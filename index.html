<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DonutSMP Market</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
background:#1b1b1b;
padding:20px;
text-align:center;
border-bottom:2px solid #bb00ff;
}

header h1{
margin:0;
color:#bb86fc;
}

header p{
color:#ccc;
}

#searchInput{
width:300px;
padding:10px;
border:none;
border-radius:8px;
margin-top:15px;
}

.nav{
display:flex;
justify-content:center;
gap:15px;
padding:15px;
background:#181818;
}

.nav button{
background:#2a2a2a;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.nav button:hover{
background:#bb00ff;
}

.cart{
position:absolute;
top:20px;
right:20px;
font-size:24px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
max-width:1200px;
margin:auto;
}

.card{
background:#1f1f1f;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px rgba(187,0,255,0.3);
}

.price{
font-size:24px;
color:#bb86fc;
font-weight:bold;
}

.stock{
color:#7fff7f;
margin:10px 0;
}

button.buy{
background:#bb00ff;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
}

button.buy:hover{
background:#d14cff;
}
</style>
</head>

<body>

<div class="cart">🛒 <span id="cartCount">0</span></div>

<header>
<h1>🍩 DonutSMP Market</h1>
<p>Best prices on DonutSMP • Fast delivery • Trusted seller</p>

<input type="text" id="searchInput" placeholder="🔍 Search products...">
</header>

<div class="nav">
<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('money')">Money</button>
<button onclick="filterProducts('spawner')">Spawners</button>
<button onclick="filterProducts('account')">Accounts</button>
</div>

<div class="container">

<div class="card" data-category="spawner">
<h2>💀 Skeleton Spawner</h2>
<p class="price">€0.25</p>
<p class="stock">Stock: 10</p>
<button class="buy">Buy</button>
</div>

<div class="card" data-category="money">
<h2>💰 1M Money</h2>
<p class="price">€0.08</p>
<p class="stock">Stock: 250</p>
<button class="buy">Buy</button>
</div>

<div class="card" data-category="money">
<h2>💸 10M Money</h2>
<p class="price">€0.70</p>
<p class="stock">Stock: 5</p>
<button class="buy">Buy</button>
</div>

<div class="card" data-category="money">
<h2>🏦 100M Money</h2>
<p class="price">€7.00</p>
<p class="stock">Stock: 2</p>
<button class="buy">Buy</button>
</div>

</div>

<script>
let cart = 0;

document.querySelectorAll(".buy").forEach(button => {
  button.addEventListener("click", () => {
    cart++;
    document.getElementById("cartCount").textContent = cart;
  });
});

function filterProducts(category){
  document.querySelectorAll(".card").forEach(card => {
    if(category === "all"){
      card.style.display = "block";
    } else {
      card.style.display =
        card.dataset.category === category ? "block" : "none";
    }
  });
}

document.getElementById("searchInput").addEventListener("keyup", function() {
  let value = this.value.toLowerCase();

  document.querySelectorAll(".card").forEach(card => {
    let text = card.innerText.toLowerCase();

    card.style.display =
      text.includes(value) ? "block" : "none";
  });
});
</script>

</body>
</html>
